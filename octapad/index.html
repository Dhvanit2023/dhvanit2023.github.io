<!DOCTYPE html>
<html>
<head>
    <title>Dhvanit Octapad 🥁</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: linear-gradient(135deg, #020617, #0f172a);
            color: white;
            text-align: center;
            font-family: Arial;
        }

        h1 {
            margin-top: 20px;
        }

        p {
            color: #94a3b8;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(3, 110px);
            gap: 15px;
            justify-content: center;
            margin-top: 40px;
        }

        .pad {
            width: 110px;
            height: 110px;
            background: #38bdf8;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: 0.1s;
            user-select: none;
        }

        .pad:active {
            transform: scale(0.9);
            background: #0ea5e9;
        }
    </style>
</head>

<body>

<h1>🥁 Dhvanit Octapad</h1>
<p>Tap / Click / Press keys (A S D F G H)</p>

<div class="container">
    <div class="pad" onclick="play('kick')">Kick (A)</div>
    <div class="pad" onclick="play('snare')">Snare (S)</div>
    <div class="pad" onclick="play('hihat')">HiHat (D)</div>
    <div class="pad" onclick="play('clap')">Clap (F)</div>
    <div class="pad" onclick="play('tom')">Tom (G)</div>
    <div class="pad" onclick="play('crash')">Crash (H)</div>
</div>

<script>
function play(sound) {
    let audio = new Audio("sounds/" + sound + ".mp3");
    audio.currentTime = 0;
    audio.play();
}

// Keyboard support
document.addEventListener("keydown", function(e) {
    if(e.key === "a") play("kick");
    if(e.key === "s") play("snare");
    if(e.key === "d") play("hihat");
    if(e.key === "f") play("clap");
    if(e.key === "g") play("tom");
    if(e.key === "h") play("crash");
});
</script>

</body>
</html>
