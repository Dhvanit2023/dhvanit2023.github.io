<!DOCTYPE html>
<html>
<head>
    <title>Dhvanit Octapad 🥁</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: #020617;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(3, 110px);
            gap: 15px;
            justify-content: center;
            margin-top: 40px;
        }

        .pad {
            width: 110px;
            height: 110px;
            background: #38bdf8;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            transition: 0.05s;
            user-select: none;
        }

        /* Active flash effect */
        .pad.active {
            background: #facc15;
            transform: scale(0.9);
            box-shadow: 0 0 20px #facc15;
        }
    </style>
</head>

<body>

<h1>🥁 Dhvanit Octapad</h1>
<p>Tap / Press keys (A S D F G H)</p>

<div class="container">
    <div class="pad" data-key="a" data-sound="kick">Kick</div>
    <div class="pad" data-key="s" data-sound="snare">Snare</div>
    <div class="pad" data-key="d" data-sound="hihat">HiHat</div>
    <div class="pad" data-key="f" data-sound="clap">Clap</div>
    <div class="pad" data-key="g" data-sound="tom">Tom</div>
    <div class="pad" data-key="h" data-sound="crash">Crash</div>
</div>

<script>
const pads = document.querySelectorAll(".pad");

// preload sounds (fast play)
const sounds = {};
pads.forEach(pad => {
    const name = pad.dataset.sound;
    sounds[name] = new Audio("sounds/" + name + ".mp3");
});

// play function
function playPad(pad) {
    const soundName = pad.dataset.sound;
    const audio = sounds[soundName].cloneNode(); // allow rapid play
    audio.play();

    // visual effect
    pad.classList.add("active");
    setTimeout(() => pad.classList.remove("active"), 100);
}

// touch + click
pads.forEach(pad => {
    pad.addEventListener("mousedown", () => playPad(pad));
    pad.addEventListener("touchstart", () => playPad(pad));
});

// keyboard
document.addEventListener("keydown", e => {
    pads.forEach(pad => {
        if (pad.dataset.key === e.key) {
            playPad(pad);
        }
    });
});
</script>

</body>
</html>
