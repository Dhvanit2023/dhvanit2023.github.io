<!DOCTYPE html>
<html>
<head>
    <title>Dhvanit Octapad Pro 🥁</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            background: #020617;
            color: white;
            font-family: Arial;
            overflow: hidden;
        }

        h1 {
            text-align: center;
            margin: 10px;
        }

        #padArea {
            width: 100vw;
            height: 90vh;
            position: relative;
        }

        .zone {
            position: absolute;
            border: 1px solid #1e293b;
        }

        .active {
            background: rgba(250, 204, 21, 0.3);
        }
    </style>
</head>

<body>

<h1>🥁 Dhvanit Smart Octapad</h1>
<p style="text-align:center;">Touch anywhere (trackpad supported)</p>

<div id="padArea"></div>

<script>
const padArea = document.getElementById("padArea");

// define zones (6 parts)
const soundsMap = {
    "TL": "kick",
    "TM": "snare",
    "TR": "hihat",
    "BL": "clap",
    "BM": "tom",
    "BR": "crash"
};

// preload sounds
const sounds = {};
for (let key in soundsMap) {
    const name = soundsMap[key];
    sounds[name] = new Audio("sounds/" + name + ".mp3");
}

// play function
function play(sound) {
    const audio = sounds[sound].cloneNode();
    audio.play();
}

// detect zone
function detectZone(x, y) {
    const width = window.innerWidth;
    const height = window.innerHeight;

    const col = x < width/3 ? 0 : x < (2*width/3) ? 1 : 2;
    const row = y < height/2 ? 0 : 1;

    const zones = [
        ["TL","TM","TR"],
        ["BL","BM","BR"]
    ];

    return zones[row][col];
}

// visual feedback
function flashZone(zone) {
    const div = document.createElement("div");
    div.className = "zone active";

    const w = window.innerWidth / 3;
    const h = window.innerHeight / 2;

    const pos = {
        "TL":[0,0],"TM":[1,0],"TR":[2,0],
        "BL":[0,1],"BM":[1,1],"BR":[2,1]
    };

    const [cx, cy] = pos[zone];

    div.style.left = (cx*w) + "px";
    div.style.top = (cy*h) + "px";
    div.style.width = w + "px";
    div.style.height = h + "px";

    padArea.appendChild(div);

    setTimeout(()=>div.remove(), 100);
}

// touch support
padArea.addEventListener("touchstart", e => {
    const touch = e.touches[0];
    handleInput(touch.clientX, touch.clientY);
});

// mouse / trackpad click
padArea.addEventListener("mousedown", e => {
    handleInput(e.clientX, e.clientY);
});

// main handler
function handleInput(x, y) {
    const zone = detectZone(x, y);
    const sound = soundsMap[zone];

    play(sound);
    flashZone(zone);
}

// keyboard support
document.addEventListener("keydown", e => {
    const map = {
        a:"kick", s:"snare", d:"hihat",
        f:"clap", g:"tom", h:"crash"
    };

    if(map[e.key]) {
        play(map[e.key]);
    }
});
</script>

</body>
</html>
